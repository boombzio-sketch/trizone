name: iOS Release
#
# 코드사인: fastlane match 사용. 배포 인증서/프로파일을 이 저장소의 match-certs 브랜치에
# AES 암호화 저장해 재사용한다(Mac 불필요, 인증서 개수 한도에 재차 안 걸림).
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_CONTENT  : App Store Connect API .p8 키 내용
#   APP_STORE_CONNECT_API_KEY_ID       : API 키 ID
#   APP_STORE_CONNECT_API_ISSUER_ID    : API Issuer ID
#   APPLE_TEAM_ID                      : Apple 개발자 팀 ID
#   MATCH_PASSWORD                     : match 저장소 암호화 비밀번호(임의의 강한 문자열, 분실 금지)
#
# 인증서 git 저장은 워크플로 GITHUB_TOKEN으로 처리하므로 PAT 불필요.
# 첫 실행 시 match가 배포 인증서를 1개 생성하므로 Apple 포털에서 빈 슬롯 1칸이 필요하다.
#
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.0.0)'
        required: true
permissions:
  contents: write   # match가 match-certs 브랜치에 인증서를 push 하기 위해 필요
jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 120
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building marketing version $VERSION"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: client
      - name: Install npm dependencies
        run: |
          npm ci
          npm install --no-save typescript
      - name: Build web assets
        run: npm run build
      - name: Add iOS platform
        run: npx cap add ios
      - name: Sync Capacitor and install pods
        run: |
          npx cap sync ios
          cat > ios/App/Podfile << 'PODFILE'
          platform :ios, '16.0'
          use_frameworks!

          install! 'cocoapods', :disable_input_output_paths => true

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          PODFILE
          cd ios/App
          pod install --repo-update
      - name: Generate app icons from 1024 source
        run: |
          npm install --no-save @capacitor/assets
          npx @capacitor/assets generate --ios --assetPath assets
          echo "Generated AppIcon assets:"
          ls ios/App/App/Assets.xcassets/AppIcon.appiconset/
      - name: Fix AppDelegate.swift
        run: |
          cat > ios/App/App/AppDelegate.swift << 'SWIFT'
          import UIKit
          import Capacitor

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}
              func applicationDidEnterBackground(_ application: UIApplication) {}
              func applicationWillEnterForeground(_ application: UIApplication) {}
              func applicationDidBecomeActive(_ application: UIApplication) {}
              func applicationWillTerminate(_ application: UIApplication) {}

              func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }
          }
          SWIFT
      - name: Configure Info.plist (display name, photo/camera permissions, encryption)
        run: |
          PLIST=ios/App/App/Info.plist
          # Home screen display name
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string TRIZONE" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TRIZONE" "$PLIST"
          # Photo library access (Korean)
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 운동 기록에 사진을 첨부하기 위해 사진 접근 권한이 필요합니다." "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 운동 기록에 사진을 첨부하기 위해 사진 접근 권한이 필요합니다." "$PLIST"
          # Camera access (Korean)
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 운동 기록 사진을 촬영하기 위해 카메라 접근 권한이 필요합니다." "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 운동 기록 사진을 촬영하기 위해 카메라 접근 권한이 필요합니다." "$PLIST"
          # Export compliance
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          echo "CFBundleDisplayName             = $(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$PLIST")"
          echo "NSPhotoLibraryUsageDescription = $(/usr/libexec/PlistBuddy -c 'Print :NSPhotoLibraryUsageDescription' "$PLIST")"
          echo "NSCameraUsageDescription       = $(/usr/libexec/PlistBuddy -c 'Print :NSCameraUsageDescription' "$PLIST")"
          echo "ITSAppUsesNonExemptEncryption  = $(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$PLIST")"
      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY_CONTENT" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_CONTENT secret is empty or missing."
            exit 1
          fi
          KEY_DIR="$HOME/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | tr -d '\r' > "$KEY_PATH"
          if ! head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::APP_STORE_CONNECT_API_KEY_CONTENT does not look like a .p8 PEM key."
            exit 1
          fi
          chmod 600 "$KEY_PATH"
          echo "API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
      - name: Prepare match git auth (PAT-free, uses GITHUB_TOKEN)
        run: |
          if [ -z "${{ secrets.MATCH_PASSWORD }}" ]; then
            echo "::error::MATCH_PASSWORD secret is empty or missing. Add it under Settings → Secrets and variables → Actions (any strong passphrase; do not lose it)."
            exit 1
          fi
          AUTH=$(printf 'x-access-token:%s' "${{ github.token }}" | base64 | tr -d '\n')
          echo "::add-mask::$AUTH"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$AUTH" >> "$GITHUB_ENV"
      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: https://github.com/${{ github.repository }}.git
          MATCH_GIT_BRANCH: match-certs
        run: bundle exec fastlane beta
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            client/build/*.ipa
            client/build/*.dSYM.zip
            client/build/logs/
          if-no-files-found: ignore
          retention-days: 14
