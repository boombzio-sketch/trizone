name: iOS Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.0.0)'
        required: true
jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building marketing version $VERSION"
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: client
      - name: Install npm dependencies
        run: |
          npm ci
          npm install --no-save typescript
      - name: Build web assets
        run: npm run build
      - name: Add iOS platform
        run: npx cap add ios
      - name: Sync Capacitor and install pods
        run: |
          npx cap sync ios
          cat > ios/App/Podfile << 'PODFILE'
          platform :ios, '16.0'
          use_frameworks!

          install! 'cocoapods', :disable_input_output_paths => true

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          PODFILE
          cd ios/App
          pod install --repo-update
      - name: Fix AppDelegate.swift
        run: |
          cat > ios/App/App/AppDelegate.swift << 'SWIFT'
          import UIKit
          import Capacitor

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}
              func applicationDidEnterBackground(_ application: UIApplication) {}
              func applicationWillEnterForeground(_ application: UIApplication) {}
              func applicationDidBecomeActive(_ application: UIApplication) {}
              func applicationWillTerminate(_ application: UIApplication) {}

              func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
              }

              func application(_ application: UIApplication, continue userActivity: NSUserActivity, restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)
              }
          }
          SWIFT
      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY_CONTENT" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_CONTENT secret is empty or missing."
            exit 1
          fi
          KEY_DIR="$HOME/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | tr -d '\r' > "$KEY_PATH"
          if ! head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::APP_STORE_CONNECT_API_KEY_CONTENT does not look like a .p8 PEM key."
            echo "File size: $(wc -c < "$KEY_PATH") bytes"
            echo "First line:"
            head -1 "$KEY_PATH"
            rm -f "$KEY_PATH"
            exit 1
          fi
          chmod 600 "$KEY_PATH"
          echo "API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "Wrote $(wc -c < "$KEY_PATH") bytes to $KEY_PATH"
      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
        run: bundle exec fastlane beta
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            client/build/*.ipa
            client/build/*.dSYM.zip
            client/build/logs/
          if-no-files-found: ignore
          retention-days: 14
